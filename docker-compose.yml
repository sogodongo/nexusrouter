services:
  redis:
    image: redis:7.2
    container_name: nexusrouter-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  postgres:
    image: postgres:15
    container_name: nexusrouter-pg
    environment:
      POSTGRES_DB: nexusrouter
      POSTGRES_USER: nexusrouter
      POSTGRES_PASSWORD: nexusrouter
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  redis_data:
  pg_data:
